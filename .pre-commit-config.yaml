# INFRAS-CLOUD Pre-commit Configuration
# Atmospheric Infrasound & Severe Weather Acoustic Signatures

repos:
  # ============================================
  # GENERAL HOOKS
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=10240]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs

  # ============================================
  # PYTHON FORMATTING
  # ============================================
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        args: [--line-length=100]
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]
        name: isort (python)

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.0
    hooks:
      - id: pyupgrade
        args: [--py39-plus]

  # ============================================
  # PYTHON LINTING
  # ============================================
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --extend-ignore=E203,W503]
        additional_dependencies:
          - flake8-docstrings>=1.7.0
          - flake8-bugbear>=24.1.17
          - flake8-comprehensions>=3.14.0

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --follow-imports=silent]
        additional_dependencies:
          - numpy>=1.24.0
          - scipy>=1.10.0
          - types-python-dateutil
          - types-pytz

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: [--skip=B101, --confidence-level=high]
        files: ^infrascloud/

  - repo: https://github.com/pylint-dev/pylint
    rev: v3.0.3
    hooks:
      - id: pylint
        args: [--max-line-length=100, --fail-under=8.0]
        additional_dependencies:
          - numpy
          - scipy

  # ============================================
  # SCIENTIFIC CODE QUALITY
  # ============================================
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.7.1
    hooks:
      - id: nbqa-black
        args: [--line-length=100]
      - id: nbqa-isort
        args: [--profile=black]
      - id: nbqa-flake8
        args: [--max-line-length=100]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.6.1
    hooks:
      - id: nbstripout
        args: [--drop-empty-cells, --extra-keys=metadata.kernelspec]

  # ============================================
  # MARKDOWN & DOCUMENTATION
  # ============================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: [--fix, --ignore=CHANGELOG.md]

  - repo: https://github.com/DavidAnson/markdownlint
    rev: v0.35.0
    hooks:
      - id: markdownlint
        args: [--fix]

  # ============================================
  # DOCKER
  # ============================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008]

  # ============================================
  # SPELL CHECKING
  # ============================================
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        args: [--ignore-words=.codespell-ignore.txt]
        exclude: ^(\.git|venv|data|notebooks)/|\.ipynb$

  # ============================================
  # SECURITY
  # ============================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^(\.env\.example|tests/fixtures/)$

  # ============================================
  # GITHUB ACTIONS
  # ============================================
  - repo: https://github.com/rhysd/actionlint
    rev: v1.6.26
    hooks:
      - id: actionlint-docker

  # ============================================
  # LOCAL HOOKS
  # ============================================
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest tests/ -v --numprocesses=auto
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]

      - id: validate-aisi-weights
        name: Validate AISI Weights
        entry: python scripts/validate_aisi_weights.py
        language: system
        files: ^infrascloud/aisi\.py$
        pass_filenames: false

      - id: check-wavelet-params
        name: Check Wavelet Parameters
        entry: python scripts/check_wavelet_params.py
        language: system
        files: ^infrascloud/processing/wavelet\.py$
        pass_filenames: false

# ============================================
# CI SETTINGS
# ============================================
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autoupdate_commit_msg: |
    [pre-commit.ci] pre-commit autoupdate
  autoupdate_schedule: monthly
  skip:
    - pylint
    - mypy
    - pytest
    - validate-aisi-weights
    - check-wavelet-params

# ============================================
# EXCLUDE PATTERNS
# ============================================
exclude: |
  (?x)^(
    \.venv/|
    venv/|
    env/|
    data/|
    notebooks/\.ipynb_checkpoints/|
    \.pytest_cache/|
    \.mypy_cache/|
    \.tox/|
    build/|
    dist/|
    .*\.egg-info/
  )$
