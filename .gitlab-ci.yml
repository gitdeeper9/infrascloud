# INFRAS-CLOUD GitLab CI/CD Configuration
# Atmospheric Infrasound & Severe Weather Acoustic Signatures

stages:
  - test
  - build
  - deploy
  - docs

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

cache:
  paths:
    - .cache/pip
    - venv/

# ============================================
# TEST STAGE
# ============================================
.test_template: &test_definition
  stage: test
  image: python:3.10-slim
  before_script:
    - apt-get update && apt-get install -y libhdf5-dev
    - pip install --upgrade pip
    - pip install pytest pytest-cov pytest-xdist
    - pip install -r requirements.txt
    - pip install -e .
  script:
    - pytest tests/ -v --cov=infrascloud --cov-report=term --numprocesses=auto
  artifacts:
    reports:
      junit: report.xml

test-python39:
  <<: *test_definition
  image: python:3.9-slim

test-python310:
  <<: *test_definition
  image: python:3.10-slim

test-python311:
  <<: *test_definition
  image: python:3.11-slim

lint:
  stage: test
  image: python:3.10-slim
  before_script:
    - pip install flake8 black isort mypy
  script:
    - flake8 infrascloud/ tests/ --max-line-length=100
    - black --check infrascloud/ tests/ --line-length=100
    - isort --check-only infrascloud/ tests/ --profile=black
    - mypy infrascloud/ --ignore-missing-imports

# ============================================
# BUILD STAGE
# ============================================
build-package:
  stage: build
  image: python:3.10-slim
  before_script:
    - pip install build twine wheel
  script:
    - python -m build
    - twine check dist/*
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

build-docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
    - docker tag $DOCKER_IMAGE $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - tags

# ============================================
# DEPLOY STAGE
# ============================================
deploy-pypi:
  stage: deploy
  image: python:3.10-slim
  before_script:
    - pip install twine
  script:
    - TWINE_PASSWORD=${PYPI_TOKEN} twine upload --username __token__ --skip-existing dist/*
  only:
    - tags
  when: manual

deploy-netlify:
  stage: deploy
  image: node:18-alpine
  before_script:
    - npm install -g netlify-cli
  script:
    - cd dashboard
    - npm install
    - npm run build
    - netlify deploy --prod --dir=build --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN
  only:
    - main
  environment:
    name: production
    url: https://infrascloud.netlify.app

# ============================================
# DOCS STAGE
# ============================================
build-docs:
  stage: docs
  image: python:3.10-slim
  before_script:
    - pip install mkdocs mkdocs-material mkdocstrings[python] pymdown-extensions
  script:
    - mkdocs build --strict
  artifacts:
    paths:
      - site/

pages:
  stage: deploy
  script:
    - mv site/ public/
  artifacts:
    paths:
      - public
  only:
    - main
