# INFRAS-CLOUD ReadTheDocs Configuration
# Atmospheric Infrasound & Severe Weather Acoustic Signatures
# Version: 1.0.0 | DOI: 10.5281/zenodo.18952438

version: 2

# ============================================
# BUILD CONFIGURATION
# ============================================
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    pre_build:
      - pip install --upgrade pip
      - pip install -r docs/requirements.txt
      - python scripts/generate_api_docs.py
      - python scripts/generate_example_notebooks.py
    post_build:
      - python scripts/validate_docs.py

# ============================================
# SPHINX CONFIGURATION
# ============================================
sphinx:
  configuration: docs/source/conf.py
  builder: html
  fail_on_warning: true

# ============================================
# PYTHON CONFIGURATION
# ============================================
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - all
    - requirements: docs/requirements.txt

# ============================================
# SEARCH CONFIGURATION
# ============================================
search:
  ranking:
    api/*: 3
    tutorials/*: 2
    explanations/*: 2
    theory/*: 3
    examples/*: 2
    reference/*: 2

# ============================================
# OUTPUT FORMATS
# ============================================
formats:
  - pdf
  - epub
  - htmlzip

# ============================================
# VERSIONING
# ============================================
versioning:
  formats: all
  defaults:
    fallback_to_latest: true

# ============================================
# REDIRECTS
# ============================================
redirects:
  index: README.md
  installation: INSTALL.md
  quickstart: tutorials/quickstart.md
  api-reference: api/index.md
  theory: theory/index.md
  examples: examples/index.md
  contributing: CONTRIBUTING.md
  changelog: CHANGELOG.md
  license: LICENSE

# ============================================
# SUBPROJECTS
# ============================================
submodules:
  include: all
  recursive: true

# ============================================
# CONDITIONAL CONFIG
# ============================================
conda:
  environment: docs/environment.yml

# ============================================
# ANALYTICS
# ============================================
analytics:
  google_analytics: UA-XXXXX-Y
  plausible: plausible.infrascloud.netlify.app

# ============================================
# CUSTOM DOMAIN
# ============================================
# domain: docs.infrascloud.netlify.app
