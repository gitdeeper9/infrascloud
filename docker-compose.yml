# INFRAS-CLOUD Docker Compose Configuration
# Atmospheric Infrasound & Severe Weather Acoustic Signatures
# Version: 1.0.0 | DOI: 10.5281/zenodo.18952438

version: '3.8'

services:
  # ============================================
  # INFRAS-CLOUD Core Service
  # ============================================
  infrascloud:
    image: gitdeeper9/infrascloud:latest
    container_name: infrascloud
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"  # Web dashboard
      - "8000:8000"  # API
      - "9090:9090"  # Metrics
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./models:/app/models
      - ./infrascloud:/app/infrascloud:ro
      - ./.env:/app/.env:ro
    environment:
      - STATION_ID=${STATION_ID:-IS42}
      - STATION_NAME=${STATION_NAME:-Azores}
      - STATION_LAT=${STATION_LAT:-38.5}
      - STATION_LON=${STATION_LON:-28.5}
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=infrascloud
      - DB_USER=infrauser
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INFRA_ENV=production
      - INFRA_LOG_LEVEL=INFO
    depends_on:
      - timescaledb
      - redis
      - prometheus
    networks:
      - infrascloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # TimescaleDB (PostgreSQL + Time-series)
  # ============================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=infrascloud
      - POSTGRES_USER=infrauser
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - infrascloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrauser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (Caching & Message Queue)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - infrascloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Prometheus (Metrics & Monitoring)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - infrascloud-network

  # ============================================
  # Grafana (Visualization)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - infrascloud-network

  # ============================================
  # Alertmanager (Alerts)
  # ============================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - infrascloud-network

  # ============================================
  # Node Exporter (Host Metrics)
  # ============================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - infrascloud-network

  # ============================================
  # Nginx (Reverse Proxy)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./web/static:/static
    depends_on:
      - infrascloud
      - grafana
    networks:
      - infrascloud-network

# ============================================
# Networks
# ============================================
networks:
  infrascloud-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================
# Volumes
# ============================================
volumes:
  timescaledb-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
